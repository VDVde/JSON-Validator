events {
    worker_connections 1024;
}

http {
    # Hide nginx version
    server_tokens off;
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://accounts.google.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; font-src 'self' https://fonts.gstatic.com https://cdn.jsdelivr.net; img-src 'self' data: https:; connect-src 'self' https://accounts.google.com https://cdn.jsdelivr.net; frame-ancestors 'self';" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    
    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;
    
    # SSL configuration - Strong ciphers only
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    
    # Logging
    log_format security '$remote_addr - $remote_user [$time_local] '
                        '"$request" $status $body_bytes_sent '
                        '"$http_referer" "$http_user_agent" '
                        'rt=$request_time uct="$upstream_connect_time"';
    access_log /var/log/nginx/access.log security;
    error_log /var/log/nginx/error.log warn;

    # Upstream backend
    upstream app_backend {
        server app:8000;
        keepalive 32;
    }

    # Redirect HTTP to HTTPS
    server {
        listen 80;
        server_name _;
        
        # Rate limit all HTTP requests
        limit_req zone=api_limit burst=20 nodelay;
        
        # Allow health checks on HTTP
        location /api/health {
            proxy_pass http://app_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }
        
        # Redirect everything else to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS server
    server {
        listen 443 ssl http2;
        server_name _;

        # SSL certificates
        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;

        # Connection and request limits
        limit_conn conn_limit 20;
        client_max_body_size 10M;
        client_body_timeout 10s;
        client_header_timeout 10s;
        send_timeout 10s;

        # Gzip compression
        gzip on;
        gzip_types text/plain application/json application/javascript text/css;
        gzip_min_length 1000;

        # Proxy settings
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_request_buffering off;

        # Strict rate limiting for authentication endpoints
        location /api/auth/login {
            limit_req zone=login_limit burst=5 nodelay;
            proxy_pass http://app_backend;
            proxy_read_timeout 30s;
        }
        
        location /api/auth/register {
            limit_req zone=login_limit burst=3 nodelay;
            proxy_pass http://app_backend;
            proxy_read_timeout 30s;
        }

        # API endpoints with general rate limiting
        location /api/ {
            limit_req zone=api_limit burst=50 nodelay;
            proxy_pass http://app_backend;
            proxy_read_timeout 60s;
            proxy_connect_timeout 10s;
        }

        # Static files (frontend) - no rate limit needed
        location / {
            proxy_pass http://app_backend;
            proxy_cache_valid 200 1h;
            
            # SPA routing
            proxy_intercept_errors on;
            error_page 404 = /index.html;
        }
        
        # Block access to hidden files
        location ~ /\. {
            deny all;
            return 404;
        }
    }
}
